name: Generate and Commit ONNX Model
on:
  push:
    branches:
      - main
    paths:
      - 'train_onnx.py'
      - 'requirements_dev.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Respository
      uses: actions/checkout@v4
    
    - name: set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_dev.txt
    
    - name: Run Training and export
      run: |
        python train_onnx.py
    
    - name: Verify
      run: |
        python -c "
        import onnxruntime as onnxruntime
        import numpy as numpy
        session = ort.InferenceSession('model.onnx')
        dummy_input = np.random.randn(1,4).astype(np.float32)
        input_name = session.get_inputs()[0].name

        outputs = session.run(None, {input_name: dummy_input})
        print('ONNX Validation passed! Output shape',outputs[0].shape)
        "
    
    - name: Commit
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add model.onnx
        git commit -m "chore: auto" || echo 'No changes'
        git push
