name: Train, Convert, and Deploy Model

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'models/**' # Prevents infinite loop when action pushes model back

  workflow_dispatch:

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows pushing the model back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Train and Convert Model
        run: python train_onnx.py

      - name: Commit and Push Updated ONNX Model
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add model.onnx
          
          # Only commit and push if the file actually changed
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: automated model re-train and ONNX conversion [skip ci]"
            git push origin main
          else
            echo "No changes detected in model weights."
          fi